services:
  postgres:
    restart: always

  redis:
    restart: always

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    volumes: []

  celery-worker:
    restart: always
    volumes: []

  celery-beat:
    restart: always
    volumes: []

  frontend:
    command: node .next/standalone/server.js
    environment:
      PORT: "3001"
    restart: always
    volumes: []
