server {
    listen 80;
    server_name stotto.com.tr www.stotto.com.tr;
    return 301 https://stotto.com.tr$request_uri;
}

server {
    listen 80;
    server_name api.stotto.com.tr;
    return 301 https://api.stotto.com.tr$request_uri;
}

server {
    listen 443 ssl;
    server_name www.stotto.com.tr;
    ssl_certificate /etc/letsencrypt/live/stotto.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stotto.com.tr/privkey.pem;
    return 301 https://stotto.com.tr$request_uri;
}

server {
    listen 443 ssl;
    server_name stotto.com.tr;

    ssl_certificate /etc/letsencrypt/live/stotto.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stotto.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name api.stotto.com.tr;

    ssl_certificate /etc/letsencrypt/live/api.stotto.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stotto.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
